services:
  api-reportes-fintu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-reportes-fintu
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${DEFAULT_TIMEZONE:-America/Bogota}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

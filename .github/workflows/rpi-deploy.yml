name: RPi Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on:
      - self-hosted
      - Linux
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env from GitHub Secret
        shell: bash
        env:
          APP_ENV_FILE_RAW: ${{ secrets.APP_ENV_FILE }}
        run: |
          if [ -z "$APP_ENV_FILE_RAW" ]; then
            echo "Missing required secret APP_ENV_FILE"
            exit 1
          fi
          printf "%s\n" "$APP_ENV_FILE_RAW" > .env
          sed -i 's/\r$//' .env
          chmod 600 .env

      - name: Debug secret load (safe)
        shell: bash
        run: |
          echo "Environment: production"
          echo ".env lines: $(wc -l < .env)"
          echo ".env bytes: $(wc -c < .env)"
          echo ".env keys:"
      - name: Validate required keys for this app
        shell: bash
        run: |
          required_keys=(
            DATABASE_URL
            DIRECT_URL
            DEFAULT_TIMEZONE
            SMTP_HOST
            SMTP_PORT
            SMTP_USER
            SMTP_PASS
          )
          for key in "${required_keys[@]}"; do
            if ! grep -qE "^${key}=" .env; then
              echo "Missing required key in .env: ${key}"
              exit 1
            fi
          done
          echo "Required keys found."

      - name: Deploy with Docker Compose
        shell: bash
        run: |
          if [ ! -f docker-compose.yml ] && [ ! -f compose.yml ]; then
            echo "Missing docker-compose.yml or compose.yml in repository root."
            exit 1
          fi

          server_api="$(docker version --format '{{.Server.APIVersion}}' || true)"
          if [ -n "$server_api" ]; then
            echo "Using Docker Server API version: $server_api"
            export DOCKER_API_VERSION="$server_api"
          else
            echo "Could not detect server API version. Falling back to 1.41"
            export DOCKER_API_VERSION="1.41"
          fi

          if docker compose version >/dev/null 2>&1; then
            docker compose up -d --build --remove-orphans
          elif docker-compose version >/dev/null 2>&1; then
            docker-compose up -d --build --remove-orphans
          else
            echo "Neither 'docker compose' nor 'docker-compose' is available."
            exit 1
          fi

      - name: Show container status
        shell: bash
        run: |
          server_api="$(docker version --format '{{.Server.APIVersion}}' || true)"
          if [ -n "$server_api" ]; then
            export DOCKER_API_VERSION="$server_api"
          else
            export DOCKER_API_VERSION="1.41"
          fi

          if docker compose version >/dev/null 2>&1; then
            docker compose ps
          elif docker-compose version >/dev/null 2>&1; then
            docker-compose ps
          else
            echo "Neither 'docker compose' nor 'docker-compose' is available."
            exit 1
          fi

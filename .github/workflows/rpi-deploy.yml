name: RPi Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on:
      - self-hosted
      - Linux
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env from GitHub Secret
        shell: bash
        env:
          APP_ENV_FILE_RAW: ${{ secrets.APP_ENV_FILE }}
        run: |
          if [ -z "$APP_ENV_FILE_RAW" ]; then
            echo "Missing required secret APP_ENV_FILE"
            exit 1
          fi
          printf "%s\n" "$APP_ENV_FILE_RAW" > .env
          sed -i 's/\r$//' .env
          chmod 600 .env

      - name: Debug secret load (safe)
        shell: bash
        run: |
          echo "Environment: production"
          echo ".env lines: $(wc -l < .env)"
          echo ".env bytes: $(wc -c < .env)"
          echo ".env keys:"
          grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env | cut -d '=' -f1 | sort || true

          raw_smtp_pass="$(grep -E '^SMTP_PASS=' .env | head -n1 | cut -d '=' -f2- || true)"
          echo "SMTP_PASS raw length: ${#raw_smtp_pass}"
          if [[ "$raw_smtp_pass" == \"* ]]; then
            echo "SMTP_PASS starts with quote: true"
          else
            echo "SMTP_PASS starts with quote: false"
          fi
          if [[ "$raw_smtp_pass" == *\" ]]; then
            echo "SMTP_PASS ends with quote: true"
          else
            echo "SMTP_PASS ends with quote: false"
          fi
          if [[ "$raw_smtp_pass" == *" "* ]]; then
            echo "SMTP_PASS contains spaces: true"
          else
            echo "SMTP_PASS contains spaces: false"
          fi

      - name: Validate required keys for this app
        shell: bash
        run: |
          required_keys=(
            DATABASE_URL
            DIRECT_URL
            DEFAULT_TIMEZONE
            SMTP_HOST
            SMTP_PORT
            SMTP_USER
            SMTP_PASS
          )
          for key in "${required_keys[@]}"; do
            if ! grep -qE "^${key}=" .env; then
              echo "Missing required key in .env: ${key}"
              exit 1
            fi
          done
          echo "Required keys found."

      - name: Deploy with Docker Compose
        shell: bash
        run: |
          if [ ! -f docker-compose.yml ] && [ ! -f compose.yml ]; then
            echo "Missing docker-compose.yml or compose.yml in repository root."
            exit 1
          fi
          docker compose up -d --build --remove-orphans

      - name: Show container status
        shell: bash
        run: docker compose ps

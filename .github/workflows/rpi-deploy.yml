name: RPi Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env from GitHub Secret
        shell: bash
        env:
          APP_ENV_FILE_RAW: ${{ secrets.APP_ENV_FILE }}
        run: |
          if [ -z "$APP_ENV_FILE_RAW" ]; then
            echo "Missing required secret APP_ENV_FILE"
            exit 1
          fi
          printf "%s\n" "$APP_ENV_FILE_RAW" > .env
          sed -i 's/\r$//' .env
          chmod 600 .env

      - name: Validate required keys for reports backend
        shell: bash
        run: |
          if ! grep -qE '^DEFAULT_TIMEZONE=' .env; then
            echo "Missing required key in .env: DEFAULT_TIMEZONE"
            exit 1
          fi
          has_database_url=false
          has_direct_url=false
          grep -qE '^DATABASE_URL=' .env && has_database_url=true || true
          grep -qE '^DIRECT_URL=' .env && has_direct_url=true || true
          if [ "$has_database_url" = false ] && [ "$has_direct_url" = false ]; then
            echo "Missing required DB url: set DATABASE_URL or DIRECT_URL"
            exit 1
          fi
          echo "Required keys found."

      - name: Deploy with Docker Compose
        shell: bash
        run: |
          if [ ! -f docker-compose.yml ] && [ ! -f compose.yml ]; then
            echo "Missing docker-compose.yml or compose.yml in repository root."
            exit 1
          fi

          server_api="$(docker version --format '{{.Server.APIVersion}}' || true)"
          if [ -n "$server_api" ]; then
            echo "Using Docker Server API version: $server_api"
            export DOCKER_API_VERSION="$server_api"
          else
            echo "Could not detect server API version. Falling back to 1.41"
            export DOCKER_API_VERSION="1.41"
          fi

          if docker compose version >/dev/null 2>&1; then
            docker compose up -d --build --remove-orphans
          elif docker-compose version >/dev/null 2>&1; then
            docker-compose up -d --build --remove-orphans
          else
            echo "Neither 'docker compose' nor 'docker-compose' is available."
            exit 1
          fi

      - name: Show container status
        shell: bash
        run: |
          server_api="$(docker version --format '{{.Server.APIVersion}}' || true)"
          if [ -n "$server_api" ]; then
            export DOCKER_API_VERSION="$server_api"
          else
            export DOCKER_API_VERSION="1.41"
          fi

          if docker compose version >/dev/null 2>&1; then
            docker compose ps
          elif docker-compose version >/dev/null 2>&1; then
            docker-compose ps
          else
            echo "Neither 'docker compose' nor 'docker-compose' is available."
            exit 1
          fi
